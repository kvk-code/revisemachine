name: Save Tweet to Markdown

on:
  repository_dispatch:
    types: [save-tweet]
  workflow_dispatch:
    inputs:
      tweet_url:
        description: 'Tweet URL to save (e.g., https://x.com/user/status/123456789)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  save-tweet:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install puppeteer

      - name: Archive Tweet
        id: archive
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            export TWEET_URL="${{ github.event.client_payload.tweet_url }}"
          else
            export TWEET_URL="${{ github.event.inputs.tweet_url }}"
          fi
          echo "Processing: $TWEET_URL"
          node scripts/process_tweet.js

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tweets/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
              TWEET_URL="${{ github.event.client_payload.tweet_url }}"
            else
              TWEET_URL="${{ github.event.inputs.tweet_url }}"
            fi
            TWEET_ID=$(echo "$TWEET_URL" | grep -oP '(?<=status/)\d+')
            git commit -m "Archive tweet ${TWEET_ID}"
            git push
          fi
