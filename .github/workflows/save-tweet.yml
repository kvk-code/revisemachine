name: Save Tweet to Markdown

on:
  repository_dispatch:
    types: [save-tweet]
  workflow_dispatch:
    inputs:
      tweet_url:
        description: 'Tweet URL to save (e.g., https://x.com/user/status/123456789)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  save-tweet:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package.json') }}

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Archive Tweet
        id: archive
        timeout-minutes: 5
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWEET_URL: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tweet_url || github.event.inputs.tweet_url }}
        run: |
          echo "Processing: $TWEET_URL"
          node scripts/process_tweet.js

          # Capture the generated filename for title generation
          GENERATED_FILE=$(find tweets -maxdepth 1 -name '*.md' -newer tweets/.gitkeep -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2-)
          if [ -z "$GENERATED_FILE" ]; then
            GENERATED_FILE=$(ls -t tweets/*.md 2>/dev/null | head -1)
          fi
          echo "generated_file=$GENERATED_FILE" >> $GITHUB_OUTPUT
          echo "Generated: $GENERATED_FILE"

      - name: Setup Python for Title Generation
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-qwen2.5-0.5b-instruct

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Generate Smart Title
        id: title
        timeout-minutes: 2
        run: |
          GENERATED_FILE="${{ steps.archive.outputs.generated_file }}"
          if [ -z "$GENERATED_FILE" ] || [ ! -f "$GENERATED_FILE" ]; then
            echo "No file to rename"
            echo "new_filename=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Generating title for: $GENERATED_FILE"
          SMART_SLUG=$(python scripts/generate_title.py "$GENERATED_FILE")
          echo "Smart slug: $SMART_SLUG"

          # Extract author from current filename (format: authorname_slug.md)
          BASENAME=$(basename "$GENERATED_FILE" .md)
          AUTHOR_SLUG=$(echo "$BASENAME" | cut -d'_' -f1)

          # Build new filename: authorname_smarttitle.md
          NEW_FILENAME="tweets/${AUTHOR_SLUG}_${SMART_SLUG}.md"

          if [ "$GENERATED_FILE" != "$NEW_FILENAME" ]; then
            echo "Renaming: $GENERATED_FILE -> $NEW_FILENAME"
            mv "$GENERATED_FILE" "$NEW_FILENAME"
            echo "new_filename=$NEW_FILENAME" >> $GITHUB_OUTPUT
          else
            echo "Filename unchanged"
            echo "new_filename=" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push
        env:
          TWEET_URL: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tweet_url || github.event.inputs.tweet_url }}
        run: |
          git lfs install
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Pull latest changes to avoid conflicts from concurrent runs
          git pull --rebase origin master || true

          git add tweets/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TWEET_ID=$(echo "$TWEET_URL" | grep -oP '(?<=status/)\d+')
            git commit -m "Archive tweet ${TWEET_ID}"

            # Retry push with pull if it fails (handles race conditions)
            git push || (git pull --rebase origin master && git push)
          fi
